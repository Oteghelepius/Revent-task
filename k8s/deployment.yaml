apiVersion: v1
kind: ConfigMap
metadata:
  name: revent-config
data:
  FLASK_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: revent
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  selector:
    matchLabels:
      app: revent
  template:
    metadata:
      labels:
        app: revent
      containers:
      - name: revent
        image: pius20/revent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: revent-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: revent
spec:
  selector:
    app: revent
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: revent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - revent.local
    secretName: revent-tls
  rules:
  - host: revent.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: revent
            port:
              number: 80