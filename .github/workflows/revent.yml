name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: pius20/revent
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: my-eks-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./api
        push: true
        tags: pius20/revent:latest

    - name: Set up kubectl
      uses: aws-actions/setup-kubectl@v3

    - name: Update kubeconfig for EKS
      run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

    - name: Deploy to EKS
      run: |
        IMAGE_FULL=pius20/revent:latest
        kubectl set image deployment/revent revent=$IMAGE_FULL
        kubectl rollout status deployment/revent